name: Build LaTeX Documents

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cv.tex'
      - 'sections/**'
      - '.github/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'cv.tex'
      - 'sections/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. COMPILAZIONE INGLESE ---
    # Il file cv.tex di default va nell'ELSE e carica l'inglese.
    # Usiamo -jobname per creare subito il file "cv_english.pdf"
    - name: Compile English Version
      uses: xu-cheng/latex-action@v3
      with:
        root_file: cv.tex
        args: -pdf -interaction=nonstopmode -file-line-error -jobname=cv_english

    # --- 2. PREPARAZIONE ITALIANO ---
    # Invece di usare il comando complesso locale (-e $pdflatex...), qui è più sicuro
    # inserire fisicamente la definizione alla riga 1 del file usando sed.
    - name: Activate Italian Flag
      run: |
        sed -i '1s/^/\\def\\makeitalian{1}\n/' cv.tex

    # --- 3. COMPILAZIONE ITALIANO ---
    # Ora che la definizione è nel file, compiliamo.
    # Usiamo -jobname per creare subito il file "cv_italian.pdf"
    - name: Compile Italian Version
      uses: xu-cheng/latex-action@v3
      with:
        root_file: cv.tex
        args: -pdf -interaction=nonstopmode -file-line-error -jobname=cv_italian

    # --- 4. COMMIT E PUSH ---
    - name: Commit and push PDFs
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # Aggiungiamo i due file creati dai passaggi precedenti
        git add cv_english.pdf cv_italian.pdf
        # Committa solo se ci sono cambiamenti
        git diff --staged --quiet || git commit -m "Auto-update compiled PDFs [skip ci]"
        git push
    
    # --- 5. UPLOAD ARTIFACTS (Backup) ---
    - name: Upload PDFs as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CV-Both-Languages
        path: |
          cv_english.pdf
          cv_italian.pdf