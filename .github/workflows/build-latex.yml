name: Build LaTeX Documents

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cv.tex'
      - 'cover_letter.tex'
      - 'data/**'
      - 'sections/**'
      - '.github/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'cv.tex'
      - 'cover_letter.tex'
      - 'data/**'
      - 'sections/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. COMPILAZIONE INGLESE ---
    - name: Compile CV English
      uses: xu-cheng/latex-action@v3
      with:
        root_file: cv.tex
        docker_image: ghcr.io/xu-cheng/texlive-full:20260401
        args: -lualatex -interaction=nonstopmode -file-line-error -jobname=cv_english

    - name: Compile Cover Letter English
      uses: xu-cheng/latex-action@v3
      with:
        root_file: cover_letter.tex
        docker_image: ghcr.io/xu-cheng/texlive-full:20260401
        args: -lualatex -interaction=nonstopmode -file-line-error -jobname=cover_letter_english

    # --- 2. PREPARAZIONE ITALIANO ---
    - name: Activate Italian Flag
      run: |
        sed -i '1s/^/\\def\\makeitalian{1}\n/' cv.tex
        sed -i '1s/^/\\def\\makeitalian{1}\n/' cover_letter.tex

    # --- 3. COMPILAZIONE ITALIANO ---
    - name: Compile CV Italian
      uses: xu-cheng/latex-action@v3
      with:
        root_file: cv.tex
        docker_image: ghcr.io/xu-cheng/texlive-full:20260401
        args: -lualatex -interaction=nonstopmode -file-line-error -jobname=cv_italian

    - name: Compile Cover Letter Italian
      uses: xu-cheng/latex-action@v3
      with:
        root_file: cover_letter.tex
        docker_image: ghcr.io/xu-cheng/texlive-full:20260401
        args: -lualatex -interaction=nonstopmode -file-line-error -jobname=cover_letter_italian

    # ========================================================
    # AZIONE 1: AGGIORNA IL BRANCH 'pdf-release' (TUTTI I FILE)
    # ========================================================
    - name: Prepare files for PDF-Release
      run: |
        mkdir -p public_release
        # Copia TUTTI i PDF (CV + Cover Letters)
        cp cv_english.pdf cv_italian.pdf cover_letter_english.pdf cover_letter_italian.pdf public_release/

    - name: Deploy to Local Branch (pdf-release)
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public_release
        branch: pdf-release
        clean: true

    # ========================================================
    # AZIONE 2: INVIA AL SITO WEB (SOLO I CV)
    # ========================================================
    # NOTA: non usiamo più cpina/github-action-push-to-another-repository qui.
    # Quell'action fa `rm -rf` sull'intera target-directory prima di copiarci
    # dentro i file nuovi - va bene per una cartella che possediamo al 100%,
    # ma è un rischio se in futuro qualcuno mette altri file in assets/pdf/.
    # Checkout diretto + git add mirato non cancella mai nulla che non tocchiamo.
    - name: Checkout Website Repository
      if: github.event_name == 'push'
      uses: actions/checkout@v4
      with:
        repository: eneamanzi/eneamanzi.github.io
        token: ${{ secrets.API_TOKEN_GITHUB }}
        path: website-repo

    - name: Copy CVs into Website Checkout
      if: github.event_name == 'push'
      run: cp cv_english.pdf cv_italian.pdf website-repo/assets/pdf/

    - name: Commit and Push CVs
      if: github.event_name == 'push'
      working-directory: website-repo
      run: |
        git config user.email "enea.manzi@gmail.com"
        git config user.name "GitHub Actions"
        git add assets/pdf/cv_english.pdf assets/pdf/cv_italian.pdf
        git diff --staged --quiet || (
          git commit -m "Update from ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          # rebase before pushing: generate-website-data.yml also triggers on
          # data/** and pushes to the same website repo, so the branch may have
          # moved since checkout - this avoids a rejected non-fast-forward push.
          git pull --rebase
          git push
        )
    # Nota: la generazione/push di resume.json e socials.yml vive in un workflow
    # separato (generate-website-data.yml), indipendente da questa pipeline LaTeX.